<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaaS Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
<style>
:root {
  --bg:#0a0f1a; --s1:#111827; --s2:#1c2537; --s3:#243047;
  --bd:#2d3a50; --bd2:#3d4f6a;
  --gr:#00d4a8; --gr2:#00a882;
  --yl:#f5c842; --yl2:#c9a030;
  --bl:#4a9eff; --bl2:#2d7de0;
  --rd:#ff6b6b;
  --tx:#e8f0fe; --mu:#7a8ba8; --mu2:#4a5a72;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Anuphan',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* noise overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:28px 18px 140px}

/* ─── header ─── */
.hd{text-align:center;margin-bottom:32px;padding-top:8px}
.hd-logo{font-size:13px;font-weight:600;color:var(--gr);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;opacity:.8}
.hd-title{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.hd-title span{color:var(--gr)}
.hd-sub{font-size:13px;color:var(--mu);font-weight:300}

/* ─── step progress dots ─── */
.step-dots{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px}
.dot{width:8px;height:8px;border-radius:99px;background:var(--bd2);transition:all .3s}
.dot.done{background:var(--gr);width:20px}
.dot.active{background:var(--gr);box-shadow:0 0 10px var(--gr)}
.step-label{font-size:12px;color:var(--mu);text-align:center;margin-top:-18px;margin-bottom:24px}

/* ─── back btn ─── */
.back{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-family:inherit;font-size:12px;padding:5px 12px;cursor:pointer;margin-bottom:18px;transition:all .2s}
.back:hover{border-color:var(--bd2);color:var(--tx)}

/* ─── question card ─── */
.qcard{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:28px 24px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.qlabel{font-size:11px;font-weight:600;color:var(--gr);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.qtext{font-size:21px;font-weight:700;line-height:1.4;margin-bottom:22px}
.qsub{font-size:13px;color:var(--mu);margin-top:-16px;margin-bottom:20px;font-weight:300}

/* ─── option buttons ─── */
.opts{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:14px;background:var(--s2);border:1.5px solid var(--bd);border-radius:14px;padding:14px 18px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;font-size:15px;font-weight:500;transition:all .2s;position:relative;overflow:hidden}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,168,.06),transparent);opacity:0;transition:opacity .2s}
.opt:hover{border-color:var(--gr);transform:translateX(4px)}
.opt:hover::after{opacity:1}
.opt-ico{font-size:24px;min-width:34px;text-align:center;filter:drop-shadow(0 0 6px rgba(255,255,255,.2))}
.opt-txt{flex:1}
.opt-desc{font-size:12px;color:var(--mu);margin-top:2px;font-weight:300}
.opt-arr{color:var(--mu2);font-size:18px;transition:transform .2s}
.opt:hover .opt-arr{transform:translateX(4px);color:var(--gr)}

/* ─── results ─── */
.res{animation:fadeUp .35s ease}
.res-hd{text-align:center;margin-bottom:20px}
.res-hd h2{font-size:22px;font-weight:700;margin-bottom:6px}
.res-hd p{color:var(--mu);font-size:13px}
.res-hd strong{color:var(--yl)}

/* summary chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:99px;font-weight:500;white-space:nowrap}
.chip-area{background:rgba(0,232,184,.18);border:1px solid rgba(0,232,184,.5);color:#00e8b8}
.chip-budget{background:rgba(245,200,66,.18);border:1px solid rgba(245,200,66,.5);color:#f5d040}
.chip-mode{background:rgba(74,158,255,.18);border:1px solid rgba(74,158,255,.5);color:#70b8ff}
.chip-count{background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--mu)}

/* ─── question block ─── */
.qblock{margin-bottom:26px}
.qblock-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qnum{background:linear-gradient(135deg,var(--gr),var(--bl));color:#0a0f1a;font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.5px}
.qblock-sub{font-size:12px;color:var(--mu);font-weight:300}

/* ─── plan cards grid ─── */
.pcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}

/* ─── plan card ─── */
.pc{background:var(--s2);border:2px solid var(--bd);border-radius:16px;padding:14px 13px;cursor:pointer;transition:all .25s;position:relative;display:flex;flex-direction:column;gap:0;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .25s}
.pc:hover{border-color:var(--gr);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pc:hover::before{background:linear-gradient(90deg,var(--gr),var(--bl))}
.pc.selected{border-color:var(--gr);background:rgba(0,212,168,.08);box-shadow:0 0 0 1px var(--gr),0 8px 24px rgba(0,212,168,.15)}
.pc.selected::before{background:linear-gradient(90deg,var(--gr),var(--bl))}

/* check */
.pc-chk{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--gr);color:#0a0f1a;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6);transition:all .2s}
.pc.selected .pc-chk{opacity:1;transform:scale(1)}

.pc-plan{font-size:11px;font-weight:600;color:var(--mu);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.pc-price{font-size:20px;font-weight:700;color:var(--gr);line-height:1;margin-bottom:2px}
.pc-price-sub{font-size:11px;color:var(--mu);margin-bottom:10px;font-weight:300}

/* badges row */
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px;min-height:22px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.3px}
.badge-cheap{background:rgba(0,212,168,.2);color:var(--gr);border:1px solid rgba(0,212,168,.4)}
.badge-match{background:rgba(74,158,255,.2);color:var(--bl);border:1px solid rgba(74,158,255,.4)}
.badge-disc{background:rgba(245,200,66,.2);color:var(--yl);border:1px solid rgba(245,200,66,.4)}
.badge-unlimited{background:rgba(160,120,255,.15);color:#b39dff;border:1px solid rgba(160,120,255,.3)}

.pc-div{height:1px;background:rgba(255,255,255,.05);margin:7px 0}
.pc-row{display:flex;align-items:baseline;justify-content:space-between;font-size:11px;padding:2.5px 0}
.pc-row .l{color:var(--mu);font-weight:300;flex:1;padding-right:4px}
.pc-row .v{font-weight:600;text-align:right;white-space:nowrap}
.pc-row .v.hi{color:var(--gr)}
.pc-row .v.di{color:var(--yl)}
.pc-row .v.na{color:var(--mu2);font-weight:300}

/* ─── sticky bar ─── */
.sticky{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,26,.97);border-top:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:14px;z-index:100;backdrop-filter:blur(16px)}
.sticky-info{font-size:13px;color:var(--mu)}
.sticky-info strong{color:var(--tx);font-size:15px;display:block;margin-bottom:1px}
.confirm-btn{background:linear-gradient(135deg,var(--gr),var(--bl2));color:#fff;border:none;border-radius:12px;padding:12px 26px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;letter-spacing:.3px}
.confirm-btn:hover{opacity:.88}
.confirm-btn:disabled{background:var(--s3);color:var(--mu);cursor:not-allowed;opacity:1}

/* ─── confirmed box ─── */
.conf{background:#1e2d47;border:1.5px solid #3a5070;border-radius:20px;padding:24px;margin-bottom:16px;animation:fadeUp .3s ease}
.conf-logo{font-size:12px;font-weight:600;color:#00e8b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.conf-title{font-size:18px;font-weight:700;color:#00e8b8;margin-bottom:4px}
.conf-qref{display:inline-block;font-size:22px;font-weight:800;color:#fff;letter-spacing:1px;white-space:nowrap;background:linear-gradient(135deg,rgba(0,232,184,.25),rgba(74,158,255,.25));border:1.5px solid rgba(0,232,184,.5);border-radius:10px;padding:6px 18px;margin:6px 0 10px;}
.conf-sub{font-size:13px;color:#9ab0cc;margin-bottom:16px}
.conf-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.conf-detail{background:#263550;border-radius:12px;padding:12px 16px;text-align:left}
.conf-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.conf-row:last-child{border:none}
.conf-row .cl{color:#9ab0cc;font-weight:400;white-space:nowrap}
.conf-row .cv{white-space:nowrap}
.conf-row .cv{font-weight:700;color:#e8f0fe}
.conf-row .cv.hi{color:#00e8b8}
.conf-row .cv.di{color:#f5d040}
.conf-footer{font-size:11px;color:#6a85a8;text-align:center;margin-top:12px}
.conf-p1{background:#1a2a40;border:1px solid #2d4060;border-radius:10px;padding:10px 14px;margin:12px 0;text-align:left}
.conf-p1-title{font-size:10px;font-weight:600;color:#00e8b8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.conf-p1-grid{display:grid;grid-template-columns:1fr;gap:2px}
.conf-p1-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
.conf-p1-row:last-child{border:none}
.conf-p1-row .pl{color:#7a9ab8;font-weight:400}
.conf-p1-row .pv{font-weight:600;color:#c8ddf0;margin-left:8px;text-align:right}

.screenshot-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:rgba(245,200,66,.1);border:1.5px solid rgba(245,200,66,.3);border-radius:12px;color:var(--yl);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:10px}
.screenshot-btn:hover{background:rgba(245,200,66,.18)}
.screenshot-btn:disabled{opacity:.4;cursor:not-allowed}

.restart-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:transparent;border:1px solid var(--bd);border-radius:12px;color:var(--mu);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.restart-btn:hover{border-color:var(--bd2);color:var(--tx)}

.empty-state{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-state .icon{font-size:40px;margin-bottom:14px}
.empty-state h3{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:6px}
.empty-state p{font-size:13px;margin-bottom:20px;font-weight:300}

/* ── Part 1 form ── */
.p1-wrap{animation:fadeUp .3s ease}
.p1-title{font-size:11px;font-weight:600;color:var(--gr);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.p1-head{font-size:21px;font-weight:700;margin-bottom:4px}
.p1-sub{font-size:13px;color:var(--mu);margin-bottom:22px;font-weight:300}
.p1-section{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px}
.p1-section-title{font-size:12px;font-weight:600;color:var(--gr);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;opacity:.8}
.p1-row{margin-bottom:14px}
.p1-label{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:7px;display:block}
.p1-label span{color:var(--mu);font-weight:300;font-size:12px;margin-left:4px}
.p1-input{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;color:var(--tx);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.p1-input:focus{border-color:var(--gr)}
.p1-input::placeholder{color:var(--mu2)}
.p1-radio-group{display:flex;flex-wrap:wrap;gap:8px}
.p1-radio{display:flex;align-items:center;gap:7px;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--tx)}
.p1-radio:hover{border-color:var(--bd2)}
.p1-radio.active{border-color:var(--gr);background:rgba(0,212,168,.08);color:var(--gr)}
.p1-radio input{display:none}
.p1-check-group{display:flex;flex-wrap:wrap;gap:8px}
.p1-table{width:100%;border-collapse:collapse;font-size:12px}
.p1-table th{color:var(--mu);font-weight:500;padding:6px 8px;text-align:center;border-bottom:1px solid var(--bd);font-size:11px}
.p1-table th:first-child{text-align:left}
.p1-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--tx)}
.p1-table td:not(:first-child){text-align:center}
.p1-table input[type=number]{width:70px;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;padding:5px 8px;color:var(--tx);font-family:inherit;font-size:12px;text-align:center;outline:none;transition:border-color .2s}
.p1-table input[type=number]:focus{border-color:var(--gr)}
.p1-next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gr),var(--bl2));color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.3px;transition:opacity .2s}
.p1-next-btn:hover{opacity:.9}
.p1-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(0,212,168,.15);color:var(--gr);border:1px solid rgba(0,212,168,.3);margin-left:6px}

/* ── Progress bar ── */
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.prog-bar{flex:1;height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gr),var(--bl));border-radius:99px;transition:width .4s ease}
.prog-label{font-size:12px;color:var(--mu);white-space:nowrap;font-weight:500}

/* ── Current plan button ── */
.cur-plan-btn{width:100%;margin-top:12px;padding:14px 18px;background:rgba(255,255,255,.04);border:1.5px dashed var(--bd2);border-radius:14px;color:var(--mu);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;text-align:center}
.cur-plan-btn:hover{border-color:var(--mu);color:var(--tx)}
.cur-plan-btn.selected{background:rgba(255,107,107,.1);border-color:#ff6b6b;border-style:solid;color:#ff9a9a;font-weight:700}

/* ── Summary table ── */
.sum-table{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:6px 4px;margin-bottom:4px}
.sum-row{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.sum-row:last-child{border:none}
.sum-q{font-size:12px;color:var(--mu);font-weight:500}
.sum-plan{font-size:13px;font-weight:700;color:var(--gr)}
.sum-plan.cur{color:#ff9a9a}
.sum-price{font-size:13px;font-weight:600;color:var(--tx);text-align:right}

/* ── Capture detail blocks ── */
.cap-grid{display:grid;gap:8px}
.cap-qblock{background:#1a2a40;border:1px solid #2d4060;border-radius:10px;padding:10px 14px}
.cap-qnum{font-size:12px;font-weight:700;color:#00e8b8;margin-bottom:6px;white-space:nowrap}
.cap-plan-tag{background:rgba(0,232,184,.15);border:1px solid rgba(0,232,184,.3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:6px;color:#fff}
.cap-cur{font-size:12px;color:#ff9a9a;font-style:italic}
.cap-rows{}
.cap-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
.cap-row:last-child{border:none}
.cap-row .cl{color:#7a9ab8;font-weight:400}
.cap-row .hi{color:#00e8b8;font-weight:600}
.cap-row .di{color:#f5d040;font-weight:600}
.cap-row .na{color:#4a5a72}

/* ── Survey scroll layout ── */
.sq-progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px;position:sticky;top:0;background:var(--bg);padding:10px 0 8px;z-index:10}
.sq-progress-bar{flex:1;height:6px;background:var(--bd);border-radius:99px;overflow:hidden}
.sq-progress-fill{height:100%;background:linear-gradient(90deg,var(--gr),var(--bl));border-radius:99px;transition:width .4s ease}
.sq-progress-label{font-size:12px;color:var(--mu);white-space:nowrap;font-weight:600;min-width:60px;text-align:right}

.sq-list{display:flex;flex-direction:column;gap:24px;padding-bottom:20px}

.sq-block{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:20px 18px;transition:border-color .3s}
.sq-block:has(.pc.selected),.sq-block:has(.cur-plan-btn.selected){border-color:rgba(0,212,168,.3)}

.sq-hdr{margin-bottom:14px}
.sq-num-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sq-num{font-size:11px;font-weight:700;color:var(--gr);letter-spacing:1.5px;text-transform:uppercase}
.sq-done{background:var(--gr);color:#0a0f1a;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
.sq-todo{background:var(--bd);color:var(--mu);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.sq-title{font-size:15px;font-weight:600;color:var(--tx)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-logo">✦ MaaS Advisor</div>
    <h1 class="hd-title">เลือกแผน<span>การเดินทาง</span></h1>
    <p class="hd-sub">โครงการวิจัย MaaS · มหาวิทยาลัยเทคโนโลยีสุรนารี</p>
  </div>
  <div id="app"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  DATA — ส่วนที่ 3
// ══════════════════════════════════════════════════════════
const PB = {
  "3.1":{A:{p:590,bts:14,bus:"U",bike:"U",moto:0, taxi:0 }, B:{p:520,bts:14,bus:0,  bike:"U",moto:10,taxi:10}, C:{p:480,bts:10,bus:10, bike:"U",moto:10,taxi:10}},
  "3.2":{A:{p:490,bts:10,bus:"U",bike:"U",moto:10,taxi:0 }, B:{p:490,bts:10,bus:"U",bike:"U",moto:0, taxi:10}, C:{p:540,bts:14,bus:"U",bike:0,  moto:0, taxi:0 }},
  "3.3":{A:{p:550,bts:14,bus:10, bike:"U",moto:0, taxi:0 }, B:{p:490,bts:10,bus:"U",bike:"U",moto:10,taxi:0 }, C:{p:450,bts:10,bus:"U",bike:0,  moto:0, taxi:10}},

// ── Helpers ──────────────────────────────────────────────
function fv(val, isDisc){
  if(val==="U") return `<span class="hi">ไม่จำกัด</span>`;
  if(val===0)   return `<span class="na">–</span>`;
  if(isDisc && val>0) return `<span class="di">-${val}%</span>`;
  if(typeof val==="number" && val>0) return `<span>${val} ครั้ง</span>`;
  return `<span>${val}</span>`;
}

function getBadges(qk, pk){
  const plans = getPlans(); const d = plans[qk][pk];
  const all = ['A','B','C'];
  const badges = [];
  const minP = Math.min(...all.map(p=>plans[qk][p].p));
  if(d.p===minP) badges.push('<span class="badge badge-cheap">💰 ถูกสุด</span>');
  const maxDisc = Math.max(...all.map(p=>(plans[qk][p].moto||0)+(plans[qk][p].taxi||0)));
  const myDisc = (d.moto||0)+(d.taxi||0);
  if(myDisc===maxDisc && maxDisc>0) badges.push('<span class="badge badge-disc">🏷️ ส่วนลดสูงสุด</span>');
  if(d.bike==="U" && all.some(p=>plans[qk][p].bike!=="U")) badges.push('<span class="badge badge-unlimited">🚲 ไม่จำกัด</span>');
  const btsVals = all.map(p=>plans[qk][p].bts==="U"?999:(plans[qk][p].bts||0));
  if(d.bts && btsVals[['A','B','C'].indexOf(pk)]===Math.max(...btsVals) && Math.max(...btsVals)>0 && all.some(p=>plans[qk][p].bts!==d.bts))
    badges.push('<span class="badge badge-match">🚇 BTS มากสุด</span>');
  return badges.join('');
}

// ── Progress bar ─────────────────────────────────────────
function progressBar(cur, total){
  const pct = Math.round((cur/total)*100);
  return `<div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-label">ข้อ ${cur} / ${total}</div>
  </div>`;
}

function renderSurvey(){
  const qs = getQs();
  const plans = getPlans();
  const isBkk = S.area === 'bkk';
  const allAnswered = qs.every(q => S.answers[q]);
  const answered = qs.filter(q => S.answers[q]).length;

  const blocks = qs.map((qk, idx) => {
    const chosen = S.answers[qk] || null;

    const planCards = ['A','B','C'].map(pk => {
      const d = plans[qk][pk];
      const isSel = chosen === pk;
      const badges = getBadges(qk, pk);
      const rows = [];
      if(isBkk) rows.push(['🚇 BTS/MRT/ARL', fv(d.bts, false)]);
      rows.push(['🚌 รถเมล์/บัส',    fv(d.bus,  false)]);
      rows.push(['🚲 จักรยาน',        fv(d.bike, false)]);
      rows.push(['🛵 มอเตอร์ไซค์รับจ้าง', fv(d.moto, true)]);
      rows.push(['🚕 แท็กซี่/รถรับจ้าง',  fv(d.taxi, true)]);
      return `<div class="pc${isSel?' selected':''}" onclick="pickAnswer('${qk}','${pk}')">
        <div class="pc-chk">✓</div>
        <div class="pc-plan">แผน ${pk}</div>
        <div class="pc-price">${d.p}</div>
        <div class="pc-price-sub">บาท/สัปดาห์</div>
        <div class="badges">${badges}</div>
        <div class="pc-div"></div>
        ${rows.map(([l,v])=>`<div class="pc-row"><span class="l">${l}</span>${v}</div>`).join('')}
      </div>`;
    }).join('');

    const curSel = chosen === 'current';
    const answered_this = !!chosen;

    return `<div class="sq-block" id="sq-${qk}">
      <div class="sq-hdr">
        <div class="sq-num-wrap">
          <span class="sq-num">ข้อ ${qk}</span>
          ${answered_this ? `<span class="sq-done">✓</span>` : `<span class="sq-todo">${idx+1}/${qs.length}</span>`}
        </div>
        <div class="sq-title">เลือกแผนที่คุ้มค่าที่สุดสำหรับคุณ</div>
      </div>
      <div class="pcards" style="grid-template-columns:repeat(3,1fr)">${planCards}</div>
      <button class="cur-plan-btn${curSel?' selected':''}" onclick="pickAnswer('${qk}','current')">
        ${curSel?'✓ ':''}แผนการเดินทางปัจจุบันของฉันคุ้มค่ากว่า
      </button>
    </div>`;
  }).join('');

  // progress
  const pct = Math.round((answered / qs.length) * 100);

  document.getElementById('app').innerHTML = `
    <button class="back" onclick="S.screen='p3-area';render()">← ย้อนกลับ</button>

    <div class="sq-progress-wrap">
      <div class="sq-progress-bar"><div class="sq-progress-fill" style="width:${pct}%"></div></div>
      <div class="sq-progress-label">${answered} / ${qs.length} ข้อ</div>
    </div>

    <div class="sq-list">${blocks}</div>

    <div class="sticky">
      <div class="sticky-info">
        <strong>${allAnswered ? 'ตอบครบทุกข้อแล้ว' : `ตอบแล้ว ${answered}/${qs.length} ข้อ`}</strong>
        ${allAnswered ? 'พร้อมสรุปผล' : 'เลื่อนลงเพื่อตอบให้ครบ'}
      </div>
      <button class="confirm-btn" onclick="finishSurvey()" ${allAnswered?'':'disabled'}>สรุปผล ✓</button>
    </div>`;
}

function pickAnswer(qk, pk){
  S.answers[qk] = pk;
  // re-render just this block without full page reload
  const qs = getQs();
  const plans = getPlans();
  const isBkk = S.area === 'bkk';
  const answered = qs.filter(q => S.answers[q]).length;
  const allAnswered = qs.every(q => S.answers[q]);

  // Update this question block
  const block = document.getElementById('sq-'+qk);
  if(block){
    const chosen = pk;
    // update plan cards
    block.querySelectorAll('.pc').forEach((el, i) => {
      const p = ['A','B','C'][i];
      el.classList.toggle('selected', p === chosen);
      el.querySelector('.pc-chk').style.opacity = p===chosen?'1':'0';
      el.querySelector('.pc-chk').style.transform = p===chosen?'scale(1)':'scale(0.6)';
    });
    // update current plan btn
    const curBtn = block.querySelector('.cur-plan-btn');
    if(curBtn){
      curBtn.classList.toggle('selected', chosen==='current');
      curBtn.textContent = (chosen==='current'?'✓ ':'') + 'แผนการเดินทางปัจจุบันของฉันคุ้มค่ากว่า';
    }
    // update sq-done/todo badge
    const numWrap = block.querySelector('.sq-num-wrap');
    if(numWrap){
      const idx = qs.indexOf(qk);
      numWrap.innerHTML = `<span class="sq-num">ข้อ ${qk}</span><span class="sq-done">✓</span>`;
    }
  }

  // Update progress bar
  const pct = Math.round((answered / qs.length) * 100);
  const fill = document.querySelector('.sq-progress-fill');
  const label = document.querySelector('.sq-progress-label');
  if(fill) fill.style.width = pct+'%';
  if(label) label.textContent = answered+' / '+qs.length+' ข้อ';

  // Update sticky bar
  const stickyInfo = document.querySelector('.sticky-info strong');
  const stickyInfo2 = document.querySelector('.sticky-info');
  const confirmBtn = document.querySelector('.confirm-btn');
  if(stickyInfo) stickyInfo.textContent = allAnswered ? 'ตอบครบทุกข้อแล้ว' : `ตอบแล้ว ${answered}/${qs.length} ข้อ`;
  if(stickyInfo2){
    const small = stickyInfo2.childNodes[stickyInfo2.childNodes.length-1];
    if(small && small.nodeType===3) small.textContent = allAnswered ? 'พร้อมสรุปผล' : ' เลื่อนลงเพื่อตอบให้ครบ';
  }
  if(confirmBtn) confirmBtn.disabled = !allAnswered;

  // Scroll to next unanswered
  if(!allAnswered){
    const next = qs.find(q => !S.answers[q]);
    if(next){
      const el = document.getElementById('sq-'+next);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
}

function finishSurvey(){
  if(!getQs().every(q => S.answers[q])) return;
  S.screen = 'p3-done';
  render();
}

function toggleRadio(field, val, multi=false){
  if(multi){
    if(!P1[field]) P1[field]=[];
    const idx = P1[field].indexOf(val);
    if(idx>=0) P1[field].splice(idx,1); else P1[field].push(val);
  } else {
    P1[field] = val;
  }
  document.querySelectorAll(`[data-field="${field}"]`).forEach(el=>{
    const v = el.dataset.value;
    const isActive = multi ? (P1[field]||[]).includes(v) : P1[field]===v;
    el.classList.toggle('active', isActive);
  });
}

function takeScreenshot(){
  const el = document.getElementById('capture-box');
  if(!el) return;
  const btn = document.getElementById('ss-btn');
  btn.textContent = '⏳ กำลังสร้างภาพ...';
  btn.disabled = true;
  const scale = 3, w = el.offsetWidth, h = el.offsetHeight;
  domtoimage.toPng(el, {
    width: w*scale, height: h*scale,
    style:{ transform:`scale(${scale})`, transformOrigin:'top left', width:w+'px', height:h+'px', maxWidth:w+'px', wordBreak:'keep-all', whiteSpace:'nowrap', overflow:'visible' },
    bgcolor:'#1e2d47'
  }).then(url=>{
    const a = document.createElement('a'); a.download='maas-result.png'; a.href=url; a.click();
    btn.innerHTML='📸 บันทึกภาพผลการเลือก'; btn.disabled=false;
  }).catch(()=>{ btn.innerHTML='📸 บันทึกภาพผลการเลือก'; btn.disabled=false; });
}
